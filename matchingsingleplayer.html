// ===== Cubic Bezier Implementation =====
function cubicBezier(x1, y1, x2, y2) {
  function A(a1, a2) { return 1 - 3*a2 + 3*a1 }
  function B(a1, a2) { return 3*a2 - 6*a1 }
  function C(a1)     { return 3*a1 }

  function bezier(t, a1, a2) {
    return ((A(a1,a2)*t + B(a1,a2))*t + C(a1))*t
  }
  function slope(t, a1, a2) {
    return 3*A(a1,a2)*t*t + 2*B(a1,a2)*t + C(a1)
  }

  function getT(x) {
    let t = x
    for (let i=0; i<5; i++) {
      let s = slope(t, x1, x2)
      if (s === 0) return t
      let xCalc = bezier(t, x1, x2) - x
      t -= xCalc / s
    }
    return t
  }

  return function(x) {
    return bezier(getT(x), y1, y2)
  }
}

// ===== Animation Loop =====
function animate(target, duration, easing, callback) {
  const start = performance.now()

  function step(now) {
    let progress = Math.min((now - start) / duration, 1)
    let eased = easing(progress)
    let val = eased * target
    callback(val)
    if (progress < 1) requestAnimationFrame(step)
  }
  requestAnimationFrame(step)
}

  whentocomein = Math.floor(Math.random() * 300);
  setTimeout(fadein, whentocomein, newDiv);
  if (whattomake.substring(0,1) == "a") {
    newSpan.innerHTML = localStorage.getItem(current.concat("a", whattomake.substring(1)));
  } else {
    newSpan.innerHTML = localStorage.getItem(current.concat("q", whattomake.substring(1)));
  }
  if (localStorage.getItem("darkmode") == "1") {
    newDiv1.style.backgroundColor = "#3a3a3a";
    newDiv2.style.backgroundColor = "#3a3a3a";
    newSpan.style.color = "white";
  }
  newDiv2.appendChild(newSpan);
  document.getElementById("grid").appendChild(newDiv);
}
